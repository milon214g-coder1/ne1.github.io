name: Build APK from ZIP
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "Found zip: $ZIP_FILE"
          mkdir -p project_raw
          unzip -o "$ZIP_FILE" -d project_raw
          # zip এর ভেতরে nested ফোল্ডার থাকলেও build.gradle খুঁজে বের করে project ফোল্ডারে নিয়ে আসবে
          GRADLE_ROOT=$(find project_raw -maxdepth 3 -name "settings.gradle" -exec dirname {} \; | head -n 1)
          echo "Gradle root found at: $GRADLE_ROOT"
          mv "$GRADLE_ROOT" project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Generate debug keystore
        working-directory: project
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000

      - name: Build Debug APK
        working-directory: project
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayVibe-app-debug
          path: project/app/build/outputs/apk/debug/app-debug.apk
